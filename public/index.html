<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, shrink-to-fit=no"
    />
    <meta id="themeColorMeta" name="theme-color" content="#f5f6f8" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta id="appleStatusBarMeta" name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>Echo Codex</title>
    <script>
      try {
        if (localStorage.getItem("echoTheme") === "dark") document.documentElement.dataset.theme = "dark";
      } catch {}
    </script>
    <link rel="manifest" href="/manifest.webmanifest?v=79" />
    <link rel="stylesheet" href="/styles.css?v=79" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div class="topbar-brand">
          <button
            id="toggleSessionsButton"
            class="icon-button topbar-session-toggle"
            type="button"
            aria-label="打开会话列表"
            aria-controls="codexSessionSidebar"
            aria-expanded="false"
            data-authenticated
            hidden
          >
            ☰
          </button>
          <div class="topbar-brand-copy">
            <div class="topbar-title-row">
              <h1>Echo</h1>
              <span id="mobileStatusIndicator" class="mobile-status-indicator" aria-hidden="true"></span>
            </div>
            <p id="statusText">连接中</p>
          </div>
          <div id="projectSwitcher" class="topbar-project-switcher" data-authenticated hidden>
            <button
              id="projectSwitcherButton"
              class="topbar-project-chip"
              type="button"
              aria-label="切换工程"
              aria-haspopup="dialog"
              aria-expanded="false"
              aria-controls="projectSwitcherPanel"
            >
              <svg class="topbar-project-icon" viewBox="0 0 24 24" aria-hidden="true">
                <path
                  d="M3.5 7.8c0-1.1.9-2 2-2h4.1c.6 0 1.1.2 1.5.7l1 1.1h6.4c1.1 0 2 .9 2 2v7.6c0 1.1-.9 2-2 2h-13c-1.1 0-2-.9-2-2V7.8Z"
                  fill="none"
                  stroke="currentColor"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="1.8"
                />
              </svg>
              <strong id="composerProjectLabel">等待</strong>
            </button>
            <div id="projectSwitcherPanel" class="project-switcher-panel" role="dialog" aria-label="切换工程" hidden>
              <div id="projectSidebarCard" class="project-sidebar-card">
                <div class="project-switcher-current">
                  <span class="project-switcher-kicker">当前</span>
                  <strong id="projectPickerLabel" class="project-picker-label">等待桌面 agent</strong>
                  <span id="projectPickerMeta" class="project-picker-meta">桌面端启动后会同步可切换项目。</span>
                </div>
                <button
                  id="newProjectButton"
                  class="icon-button sidebar-project-add"
                  type="button"
                  aria-label="新建工程"
                  title="新建工程"
                >
                  +
                </button>
              </div>
              <form id="projectCreateForm" class="project-create-form" hidden>
                <label class="sr-only" for="projectCreateName">新工程名称</label>
                <input id="projectCreateName" type="text" autocomplete="off" maxlength="80" placeholder="新工程名" />
                <button id="projectCreateSubmit" class="project-create-submit" type="submit">创建</button>
              </form>
              <p id="projectSheetStatus" class="sidebar-panel-note"></p>
              <div id="projectSheetList" class="project-sheet-list sidebar-project-list" role="listbox" aria-label="项目列表"></div>
              <select id="codexProject" class="sr-only" tabindex="-1" aria-hidden="true"></select>
            </div>
          </div>
        </div>
        <button
          id="quickDeployButton"
          class="topbar-quick-deploy"
          type="button"
          aria-label="提交、推送、合并到主分支并部署当前对话"
          title="提交、推送、合并到主分支并部署当前对话"
          data-authenticated
          hidden
        >
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path
              d="M12 16.5v-9m-3.5 3.5L12 7.5l3.5 3.5M7.5 18.5h8.7a3.8 3.8 0 0 0 .7-7.5A5.2 5.2 0 0 0 6.7 12.2 3.2 3.2 0 0 0 7.5 18.5Z"
              fill="none"
              stroke="currentColor"
              stroke-linecap="round"
              stroke-linejoin="round"
              stroke-width="1.8"
            />
          </svg>
        </button>
      </header>

      <section id="loginPanel" class="auth-panel" hidden>
        <div>
          <h2>登录 Echo</h2>
          <p>登录后再连接桌面端。</p>
          <p id="loginStatus" class="auth-status" role="status"></p>
        </div>
        <form id="loginForm" class="login-form">
          <label class="field-label" for="loginUsername">用户名</label>
          <input id="loginUsername" type="text" autocomplete="username" />
          <label class="field-label" for="loginPassword">密码</label>
          <input id="loginPassword" type="password" autocomplete="current-password" />
          <button id="loginButton" class="primary" type="submit">登录</button>
        </form>
      </section>

      <section id="pairingPanel" class="pairing-panel" hidden>
        <div>
          <h2>扫码配对</h2>
          <p>打开 Echo Desktop 的概览页，扫描「手机扫码配对」二维码。</p>
          <p id="pairingStatus" class="pairing-status" role="status"></p>
        </div>
        <div class="scanner-frame">
          <video id="pairingVideo" playsinline muted></video>
        </div>
        <div class="pairing-actions">
          <button id="scanPairingButton" class="primary" type="button">打开相机扫码</button>
          <button id="stopScanButton" class="secondary" type="button" hidden>停止扫描</button>
        </div>
        <label class="field-label" for="pairingInput">或粘贴配对链接</label>
        <div class="pairing-input-row">
          <input id="pairingInput" type="text" autocomplete="off" placeholder="https://echo.example.com/?token=..." />
          <button id="savePairingButton" class="secondary" type="button">配对</button>
        </div>
      </section>

      <section id="codexView" class="codex-section" data-authenticated hidden>
        <button id="sessionBackdrop" class="session-backdrop" type="button" aria-label="关闭会话列表" hidden></button>
        <aside id="codexSessionSidebar" class="session-sidebar" aria-label="Codex 会话">
          <div class="sidebar-head">
            <strong>对话</strong>
            <div class="sidebar-head-actions">
              <button
                id="newCodexSessionButton"
                class="icon-button sidebar-add-button"
                type="button"
                aria-label="新话题"
                title="新话题"
              >
                +
              </button>
            </div>
          </div>
          <section class="sidebar-panel sidebar-panel-conversations">
            <div class="sidebar-panel-head">
              <strong>会话</strong>
            </div>
            <div class="sidebar-tools">
              <div class="session-filter" role="tablist" aria-label="会话筛选">
                <button id="showActiveSessionsButton" class="active" type="button">最近</button>
                <button id="showArchivedSessionsButton" type="button">归档</button>
              </div>
            </div>
            <div class="sidebar-status">
              <strong id="codexStatusText">等待桌面 agent</strong>
              <p id="codexQueueMeta" class="codex-runtime"></p>
            </div>
            <div id="codexJobs" class="codex-jobs"></div>
          </section>

          <section class="sidebar-panel sidebar-panel-appearance">
            <div class="sidebar-panel-head">
              <strong>偏好</strong>
            </div>
            <label class="theme-switch" for="themeModeToggle">
              <span class="theme-switch-copy">
                <span class="theme-switch-title">暗黑模式</span>
                <span class="theme-switch-subtitle">夜间低亮度显示</span>
              </span>
              <input id="themeModeToggle" type="checkbox" role="switch" aria-label="暗黑模式" />
              <span class="theme-switch-track" aria-hidden="true">
                <span class="theme-switch-thumb">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M20 14.2A7.5 7.5 0 0 1 9.8 4a8.5 8.5 0 1 0 10.2 10.2Z" />
                  </svg>
                </span>
              </span>
            </label>
            <label class="theme-switch" for="worktreeModeToggle">
              <span class="theme-switch-copy">
                <span class="theme-switch-title">隔离 worktree</span>
                <span id="worktreeModeSubtitle" class="theme-switch-subtitle">新会话默认独立执行</span>
              </span>
              <input id="worktreeModeToggle" type="checkbox" role="switch" aria-label="隔离 worktree" />
              <span class="theme-switch-track" aria-hidden="true">
                <span class="theme-switch-thumb">
                  <svg viewBox="0 0 24 24" aria-hidden="true">
                    <path d="M4 7.5h6l2 2h8v7a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-9Z" />
                  </svg>
                </span>
              </span>
            </label>
          </section>

          <section class="sidebar-panel sidebar-panel-user">
            <div class="sidebar-panel-head">
              <strong>用户中心</strong>
              <button
                id="sidebarUserToggle"
                class="icon-button sidebar-section-toggle"
                type="button"
                aria-label="展开用户中心"
                aria-controls="sidebarUserBody"
                aria-expanded="false"
                title="用户中心"
              >
                <svg viewBox="0 0 24 24" aria-hidden="true">
                  <path
                    d="M12 12a4 4 0 1 0-4-4 4 4 0 0 0 4 4Zm0 2c-3.314 0-6 1.79-6 4v1h12v-1c0-2.21-2.686-4-6-4Z"
                    fill="currentColor"
                  />
                </svg>
              </button>
            </div>
            <div id="sidebarUserBody" class="sidebar-user-body" hidden>
              <div class="sidebar-user-card">
                <div class="sidebar-user-identity">
                  <span id="userBadge" class="user-badge" hidden></span>
                  <p id="sidebarUserMeta" class="sidebar-user-meta">登录后可查看账号与配对状态。</p>
                </div>
                <div class="sidebar-user-actions">
                  <button id="openPairingButton" class="top-pair-button" type="button" hidden>扫码配对</button>
                  <button id="refreshStatus" class="secondary compact-action" type="button" hidden>刷新状态</button>
                  <button id="logoutButton" class="top-logout-button" type="button" hidden>退出</button>
                </div>
              </div>
            </div>
          </section>
        </aside>

        <section class="codex-main" aria-label="Codex 当前会话">
          <section class="conversation-head">
            <div class="conversation-head-copy">
              <strong id="activeSessionTitle">新会话</strong>
              <p id="activeSessionMeta" class="codex-runtime">选择权限、模型和推理强度后直接发送。</p>
            </div>
          </section>
          <div id="sessionStatusRail" class="session-status-rail" aria-live="polite" hidden></div>

          <section id="codexJobDetail" class="codex-job-detail">
            <div id="codexRunSummary" class="codex-run-summary"></div>
            <div id="codexApprovals" class="codex-approvals" hidden></div>
            <details class="run-log">
              <summary>运行日志</summary>
              <pre id="codexLog" class="codex-log"></pre>
            </details>
          </section>

          <section class="composer">
            <div class="composer-shell">
              <div id="turnActivityLine" class="turn-activity-line" aria-live="polite" hidden>
                <span class="turn-activity-dot" aria-hidden="true"></span>
                <span class="turn-activity-label">终端</span>
                <span id="turnActivityText" class="turn-activity-text"></span>
              </div>
              <div class="composer-statusbar" aria-label="输入状态">
                <div class="composer-status-meta">
                  <button id="composerAttachmentButton" class="composer-status-action" type="button" aria-label="附加截图">
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        d="M8.5 12.5 15 6a3.5 3.5 0 1 1 5 5l-8.5 8.5a5 5 0 0 1-7-7l9-9"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.8"
                      />
                    </svg>
                  </button>
                  <button
                    id="composerPlanModeButton"
                    class="composer-status-action composer-mode-button"
                    type="button"
                    aria-label="计划模式"
                    aria-pressed="false"
                    title="计划模式"
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        d="M8 6.5h10M8 12h10M8 17.5h10M4.8 6.5h.1M4.8 12h.1M4.8 17.5h.1"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                      />
                    </svg>
                  </button>
                  <span
                    id="contextUsageIndicator"
                    class="context-usage-ring"
                    role="meter"
                    aria-label="上下文使用 0%"
                    aria-valuemin="0"
                    aria-valuemax="100"
                    aria-valuenow="0"
                    title="上下文使用 0%"
                  ></span>
                  <button
                    id="compactContextButton"
                    class="composer-status-action"
                    type="button"
                    aria-label="压缩上下文"
                    title="压缩上下文"
                    disabled
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        d="M8 4v4H4M16 4v4h4M8 20v-4H4M16 20v-4h4M9 9l-5-5M15 9l5-5M9 15l-5 5M15 15l5 5"
                        fill="none"
                        stroke="currentColor"
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="1.8"
                      />
                    </svg>
                  </button>
                </div>
                <div class="composer-status-right">
                  <button
                    id="composerStatusText"
                    class="composer-status-text"
                    type="button"
                    aria-live="polite"
                    aria-expanded="false"
                    aria-controls="turnActivityLine"
                    disabled
                  ></button>
                  <button
                    id="stopCodexTurnButton"
                    class="composer-status-action session-stop-action"
                    type="button"
                    aria-label="中断当前 Codex turn"
                    title="中断当前 Codex turn"
                    hidden
                  >
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <rect x="7" y="7" width="10" height="10" rx="2" fill="currentColor" />
                    </svg>
                  </button>
                </div>
              </div>
              <div id="composerAttachmentTray" class="composer-attachment-tray" hidden></div>
              <div class="composer-editor">
                <textarea id="codexPrompt" rows="1" placeholder="给 Codex 发消息，继续当前话题，或者开启新话题。"></textarea>
              </div>
              <div class="composer-dock">
                <div class="composer-toolbar" aria-label="当前会话配置">
                  <label class="composer-inline-control composer-inline-select composer-inline-permission" for="codexPermissionMode">
                    <span class="composer-inline-kicker">权限</span>
                    <select id="codexPermissionMode" aria-label="选择权限模式"></select>
                  </label>
                  <label class="composer-inline-control composer-inline-select" for="codexModel">
                    <span class="composer-inline-kicker">模型</span>
                    <select id="codexModel" aria-label="选择模型"></select>
                  </label>
                  <label class="composer-inline-control composer-inline-select" for="codexReasoningEffort">
                    <span class="composer-inline-kicker">推理</span>
                    <select id="codexReasoningEffort" aria-label="选择推理强度"></select>
                  </label>
                  <button id="sendCodexButton" class="codex-submit composer-submit-inline" type="button">发送</button>
                </div>
              </div>
            </div>
            <input id="composerAttachmentInput" class="sr-only" type="file" accept="image/*" multiple />
          </section>
        </section>
      </section>
    </main>

    <script src="/app.js?v=79" type="module"></script>
  </body>
</html>
