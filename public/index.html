<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Echo Voice</title>
    <link rel="manifest" href="/manifest.webmanifest?v=4" />
    <link rel="stylesheet" href="/styles.css?v=4" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Echo Voice</h1>
          <p id="statusText">连接中</p>
        </div>
        <div class="topbar-actions">
          <span id="userBadge" class="user-badge" hidden></span>
          <button id="logoutButton" class="top-logout-button" type="button" hidden>退出</button>
          <button id="openPairingButton" class="top-pair-button" type="button" hidden>扫码配对</button>
          <button id="refreshStatus" class="icon-button" type="button" title="刷新状态" aria-label="刷新状态">
            ↻
          </button>
        </div>
      </header>

      <section id="loginPanel" class="auth-panel" hidden>
        <div>
          <h2>登录 Echo</h2>
          <p>登录后再连接桌面端。</p>
          <p id="loginStatus" class="auth-status" role="status"></p>
        </div>
        <form id="loginForm" class="login-form">
          <label class="field-label" for="loginUsername">用户名</label>
          <input id="loginUsername" type="text" autocomplete="username" />
          <label class="field-label" for="loginPassword">密码</label>
          <input id="loginPassword" type="password" autocomplete="current-password" />
          <button id="loginButton" class="primary" type="submit">登录</button>
        </form>
      </section>

      <section id="pairingPanel" class="pairing-panel" hidden>
        <div>
          <h2>扫码配对</h2>
          <p>打开 Echo Desktop 的概览页，扫描「手机扫码配对」二维码。</p>
          <p id="pairingStatus" class="pairing-status" role="status"></p>
        </div>
        <div class="scanner-frame">
          <video id="pairingVideo" playsinline muted></video>
        </div>
        <div class="pairing-actions">
          <button id="scanPairingButton" class="primary" type="button">打开相机扫码</button>
          <button id="stopScanButton" class="secondary" type="button" hidden>停止扫描</button>
        </div>
        <label class="field-label" for="pairingInput">或粘贴配对链接</label>
        <div class="pairing-input-row">
          <input id="pairingInput" type="text" autocomplete="off" placeholder="https://echo.example.com/?token=..." />
          <button id="savePairingButton" class="secondary" type="button">配对</button>
        </div>
      </section>

      <section class="compose" data-authenticated>
        <div class="mode-row" role="tablist" aria-label="处理模式">
          <button class="mode active" data-mode="chat" type="button">AI 指令</button>
          <button class="mode" data-mode="formal" type="button">正式文本</button>
          <button class="mode" data-mode="bullet" type="button">要点</button>
          <button class="mode" data-mode="email" type="button">消息</button>
          <button class="mode" data-mode="verbatim" type="button">原话</button>
        </div>

        <label class="field-label" for="contextHint">上下文</label>
        <textarea id="contextHint" class="context" rows="2" placeholder="例如：这是发给 coding agent 的需求；保留技术名词；语气要直接。"></textarea>

        <div class="recorder">
          <button id="recordButton" class="record-button" type="button" aria-label="开始录音">
            <span id="recordDot"></span>
            <span id="recordLabel">按下说话</span>
          </button>
          <div class="meters" aria-hidden="true">
            <span></span><span></span><span></span><span></span><span></span><span></span>
          </div>
        </div>
      </section>

      <section class="editor" data-authenticated>
        <div class="pane">
          <div class="pane-title">原始转写</div>
          <textarea id="rawText" rows="6" placeholder="录音完成后显示"></textarea>
        </div>
        <div class="pane primary">
          <div class="pane-title">整理后</div>
          <textarea id="finalText" rows="8" placeholder="可以在发送前继续编辑"></textarea>
        </div>
      </section>

      <nav class="actions" aria-label="操作" data-authenticated>
        <button id="refineButton" class="secondary" type="button">重新整理</button>
        <button id="copyButton" class="secondary" type="button">复制</button>
        <button id="sendButton" class="primary" type="button">发送到光标</button>
      </nav>

      <section class="codex-section" data-authenticated>
        <div class="section-head">
          <div>
            <div class="pane-title">本机 Codex</div>
            <p id="codexStatusText">等待桌面 agent</p>
          </div>
          <button id="refreshCodex" class="icon-button" type="button" title="刷新 Codex" aria-label="刷新 Codex">
            ↻
          </button>
        </div>
        <label class="field-label" for="codexProject">项目</label>
        <select id="codexProject" class="select"></select>
        <button id="sendCodexButton" class="codex-submit" type="button">交给本机 Codex</button>
        <div id="codexJobs" class="codex-jobs"></div>
        <pre id="codexLog" class="codex-log"></pre>
      </section>

      <section class="history-section" data-authenticated>
        <div class="pane-title">最近</div>
        <div id="history" class="history"></div>
      </section>
    </main>

    <script src="/app.js?v=4" type="module"></script>
  </body>
</html>
