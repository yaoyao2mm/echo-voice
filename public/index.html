<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Echo Codex</title>
    <link rel="manifest" href="/manifest.webmanifest?v=9" />
    <link rel="stylesheet" href="/styles.css?v=9" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Echo Codex</h1>
          <p id="statusText">连接中</p>
        </div>
        <div class="topbar-actions">
          <span id="userBadge" class="user-badge" hidden></span>
          <button id="logoutButton" class="top-logout-button" type="button" hidden>退出</button>
          <button id="openPairingButton" class="top-pair-button" type="button" hidden>扫码配对</button>
          <button id="refreshStatus" class="icon-button" type="button" title="刷新状态" aria-label="刷新状态" hidden>
            ↻
          </button>
        </div>
      </header>

      <section id="loginPanel" class="auth-panel" hidden>
        <div>
          <h2>登录 Echo</h2>
          <p>登录后再连接桌面端。</p>
          <p id="loginStatus" class="auth-status" role="status"></p>
        </div>
        <form id="loginForm" class="login-form">
          <label class="field-label" for="loginUsername">用户名</label>
          <input id="loginUsername" type="text" autocomplete="username" />
          <label class="field-label" for="loginPassword">密码</label>
          <input id="loginPassword" type="password" autocomplete="current-password" />
          <button id="loginButton" class="primary" type="submit">登录</button>
        </form>
      </section>

      <section id="pairingPanel" class="pairing-panel" hidden>
        <div>
          <h2>扫码配对</h2>
          <p>打开 Echo Desktop 的概览页，扫描「手机扫码配对」二维码。</p>
          <p id="pairingStatus" class="pairing-status" role="status"></p>
        </div>
        <div class="scanner-frame">
          <video id="pairingVideo" playsinline muted></video>
        </div>
        <div class="pairing-actions">
          <button id="scanPairingButton" class="primary" type="button">打开相机扫码</button>
          <button id="stopScanButton" class="secondary" type="button" hidden>停止扫描</button>
        </div>
        <label class="field-label" for="pairingInput">或粘贴配对链接</label>
        <div class="pairing-input-row">
          <input id="pairingInput" type="text" autocomplete="off" placeholder="https://echo.example.com/?token=..." />
          <button id="savePairingButton" class="secondary" type="button">配对</button>
        </div>
      </section>

      <nav id="workspaceTabs" class="workspace-tabs" aria-label="工作区" data-authenticated hidden>
        <button class="workspace-tab active" data-view="codex" type="button">任务队列</button>
        <button class="workspace-tab" data-view="compose" type="button">草稿</button>
        <button class="workspace-tab" data-view="history" type="button">历史</button>
      </nav>

      <section id="composeView" class="workspace-view compose-view" data-view-panel="compose" data-authenticated hidden>
        <section class="compose">
          <div class="mode-row" role="tablist" aria-label="处理模式">
            <button class="mode active" data-mode="chat" type="button">Codex 任务</button>
            <button class="mode" data-mode="plan" type="button">执行计划</button>
            <button class="mode" data-mode="bullet" type="button">结构化要点</button>
            <button class="mode" data-mode="verbatim" type="button">清理原文</button>
          </div>

          <label class="field-label" for="contextHint">上下文</label>
            <textarea id="contextHint" class="context" rows="2" placeholder="例如：这是一个灵感草稿；整理成可执行任务；保留技术名词。"></textarea>

        </section>

        <section class="editor">
          <div class="pane primary">
            <div class="pane-title">原始输入</div>
            <textarea id="rawText" rows="8" placeholder="随手记一个灵感、bug、功能想法或要交给 Codex 的任务。"></textarea>
          </div>
          <div class="pane primary">
            <div class="pane-title">整理后</div>
            <textarea id="finalText" rows="8" placeholder="整理成任务后，可以在加入队列前继续编辑"></textarea>
          </div>
        </section>

        <nav class="actions" aria-label="草稿操作">
          <label class="postprocess-toggle" for="postprocessToggle">
            <input id="postprocessToggle" type="checkbox" role="switch" />
            <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
            <span id="postprocessLabel">后处理</span>
          </label>
          <button id="refineButton" class="secondary" type="button">整理</button>
          <button id="copyButton" class="secondary" type="button">复制</button>
          <button id="queueDraftButton" class="primary" type="button">加入队列</button>
        </nav>
      </section>

      <section id="codexView" class="workspace-view codex-section" data-view-panel="codex" data-authenticated hidden>
        <div class="section-head">
          <div>
            <div class="pane-title">任务队列</div>
            <p id="codexStatusText">等待桌面 agent</p>
            <p id="codexQueueMeta" class="codex-runtime"></p>
            <p id="codexRuntimeText" class="codex-runtime"></p>
          </div>
          <button id="refreshCodex" class="icon-button" type="button" title="刷新 Codex" aria-label="刷新 Codex">
            ↻
          </button>
        </div>
        <label class="field-label" for="codexProject">项目</label>
        <select id="codexProject" class="select"></select>
        <label class="field-label" for="codexPrompt">任务</label>
        <textarea id="codexPrompt" rows="8" placeholder="写下一个想法或任务，加入队列后由本机 Codex 执行。"></textarea>
        <div class="codex-actions">
          <button id="useFinalForCodexButton" class="secondary" type="button">使用草稿文本</button>
          <button id="sendCodexButton" class="codex-submit" type="button">加入任务队列</button>
        </div>
        <div id="codexJobs" class="codex-jobs"></div>
        <section id="codexJobDetail" class="codex-job-detail" hidden>
          <div id="codexRunSummary" class="codex-run-summary"></div>
          <details class="run-log">
            <summary>运行日志</summary>
            <pre id="codexLog" class="codex-log"></pre>
          </details>
        </section>
      </section>

      <section id="historyView" class="workspace-view history-section" data-view-panel="history" data-authenticated hidden>
        <div class="pane-title">最近</div>
        <div id="history" class="history"></div>
      </section>
    </main>

    <script src="/app.js?v=9" type="module"></script>
  </body>
</html>
