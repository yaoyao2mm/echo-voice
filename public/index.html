<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>Echo Codex</title>
    <link rel="manifest" href="/manifest.webmanifest?v=12" />
    <link rel="stylesheet" href="/styles.css?v=12" />
  </head>
  <body>
    <main class="shell">
      <header class="topbar">
        <div>
          <h1>Echo Codex</h1>
          <p id="statusText">连接中</p>
        </div>
        <div class="topbar-actions">
          <span id="userBadge" class="user-badge" hidden></span>
          <button id="logoutButton" class="top-logout-button" type="button" hidden>退出</button>
          <button id="openPairingButton" class="top-pair-button" type="button" hidden>扫码配对</button>
          <button id="refreshStatus" class="icon-button" type="button" title="刷新状态" aria-label="刷新状态" hidden>
            ↻
          </button>
        </div>
      </header>

      <section id="loginPanel" class="auth-panel" hidden>
        <div>
          <h2>登录 Echo</h2>
          <p>登录后再连接桌面端。</p>
          <p id="loginStatus" class="auth-status" role="status"></p>
        </div>
        <form id="loginForm" class="login-form">
          <label class="field-label" for="loginUsername">用户名</label>
          <input id="loginUsername" type="text" autocomplete="username" />
          <label class="field-label" for="loginPassword">密码</label>
          <input id="loginPassword" type="password" autocomplete="current-password" />
          <button id="loginButton" class="primary" type="submit">登录</button>
        </form>
      </section>

      <section id="pairingPanel" class="pairing-panel" hidden>
        <div>
          <h2>扫码配对</h2>
          <p>打开 Echo Desktop 的概览页，扫描「手机扫码配对」二维码。</p>
          <p id="pairingStatus" class="pairing-status" role="status"></p>
        </div>
        <div class="scanner-frame">
          <video id="pairingVideo" playsinline muted></video>
        </div>
        <div class="pairing-actions">
          <button id="scanPairingButton" class="primary" type="button">打开相机扫码</button>
          <button id="stopScanButton" class="secondary" type="button" hidden>停止扫描</button>
        </div>
        <label class="field-label" for="pairingInput">或粘贴配对链接</label>
        <div class="pairing-input-row">
          <input id="pairingInput" type="text" autocomplete="off" placeholder="https://echo.example.com/?token=..." />
          <button id="savePairingButton" class="secondary" type="button">配对</button>
        </div>
      </section>

      <section id="codexView" class="codex-section" data-authenticated hidden>
        <div class="status-strip">
          <div>
            <strong id="codexStatusText">等待桌面 agent</strong>
            <p id="codexQueueMeta" class="codex-runtime"></p>
          </div>
          <button id="refreshCodex" class="icon-button" type="button" title="刷新 Codex" aria-label="刷新 Codex">
            ↻
          </button>
        </div>

        <section class="composer">
          <label class="field-label" for="codexProject">项目</label>
          <select id="codexProject" class="select"></select>
          <label class="field-label" for="codexPrompt">任务</label>
          <textarea id="codexPrompt" rows="9" placeholder="说一个灵感、bug 或要交给 Codex 的任务。"></textarea>
          <div class="composer-footer">
            <label class="postprocess-toggle" for="postprocessToggle">
              <input id="postprocessToggle" type="checkbox" role="switch" />
              <span class="switch-track" aria-hidden="true"><span class="switch-thumb"></span></span>
              <span id="postprocessLabel">后处理</span>
            </label>
            <button id="sendCodexButton" class="codex-submit" type="button">发送</button>
          </div>
        </section>

        <div id="codexJobs" class="codex-jobs"></div>
        <section id="codexJobDetail" class="codex-job-detail" hidden>
          <div id="codexRunSummary" class="codex-run-summary"></div>
          <details class="run-log">
            <summary>运行日志</summary>
            <pre id="codexLog" class="codex-log"></pre>
          </details>
        </section>
      </section>
    </main>

    <script src="/app.js?v=12" type="module"></script>
  </body>
</html>
